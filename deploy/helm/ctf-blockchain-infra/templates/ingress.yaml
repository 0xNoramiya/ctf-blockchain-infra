{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ctf.fullname" . }}
  labels: {{- include "ctf.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "ctf.fullname" . }}-backend
                port:
                  number: 8787
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: {{ include "ctf.fullname" . }}-backend
                port:
                  number: 8787
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ctf.fullname" . }}-frontend
                port:
                  number: 80
{{- end }}
