name: Backend lint

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/backend-lint.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/backend-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install backend deps
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: node --check on backend sources
        run: |
          for f in backend/*.js; do
            echo "checking $f"
            node --check "$f"
          done

      - name: node --check on frontend app.js
        run: node --check frontend/app.js

      - name: Validate manifest + compose
        run: |
          python3 -c "import json; json.load(open('backend/challenges.example.json'))"
          python3 -m pip install --quiet pyyaml
          python3 -c "import yaml; yaml.safe_load(open('docker-compose.yml'))"

      - name: Unit tests
        working-directory: backend
        run: npm test
