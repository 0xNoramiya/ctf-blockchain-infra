name: E2E smoke

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "examples/**"
      - "contracts-template/**"
      - "scripts/e2e-smoke.sh"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run E2E smoke
        run: bash scripts/e2e-smoke.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: /tmp/ctf-e2e
