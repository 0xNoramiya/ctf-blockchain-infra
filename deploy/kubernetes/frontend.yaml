apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ctf
  labels:
    app.kubernetes.io/name: ctf-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ctf-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ctf-frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: ghcr.io/example/ctf-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet: { path: /healthz, port: http }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ctf
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ctf-frontend
  ports:
    - port: 80
      targetPort: http
      name: http
