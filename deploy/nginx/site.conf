# Reverse proxy for the CTF stack.
#
# - Serves /opt/ctf/frontend as a static site.
# - Proxies /api/* to the Node backend on 127.0.0.1:8787.
# - Designed to sit behind Cloudflare's proxied A record; restrict the
#   public listener with UFW (see ../cloudflare/ufw-allow-cloudflare.sh).
#
# Replace LISTEN_PORT, SERVER_NAME, and the dist path before deploying.

server {
    listen 8080;
    listen [::]:8080;
    server_name ctf.example.com;

    root /opt/ctf/frontend;
    index index.html;

    # Generic security headers. Tighten the CSP as you add inline scripts.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Enable when serving over HTTPS end-to-end (Cloudflare Full /
    # Full-Strict, or terminating TLS at nginx with a real cert).
    # add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # Real client IP from Cloudflare. Pair this with set_real_ip_from
    # blocks listing CF's CIDRs in the http {} scope.
    real_ip_header CF-Connecting-IP;

    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        client_max_body_size 256k;
    }

    # Private-anvil JSON-RPC proxy gets a longer read timeout.
    location ~ ^/api/rpc/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        client_max_body_size 512k;
    }

    location /dist/ {
        alias /opt/ctf/frontend/dist/;
        autoindex off;
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
