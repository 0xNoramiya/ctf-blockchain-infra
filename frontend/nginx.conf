# nginx vhost used inside the frontend container. Proxies /api/* to the
# backend service. The deploy/nginx/site.conf is the standalone version
# for bare-metal hosts that aren't using docker-compose.

upstream backend {
    server backend:8787;
    keepalive 16;
}

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP — ethers loads from jsdelivr; everything else is same-origin.
    # `connect-src 'self'` covers the proxy RPC path. In direct mode
    # players bypass the browser to talk to anvil, so CSP doesn't apply.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Enable when serving over HTTPS end-to-end (Cloudflare Full or
    # Full-Strict). Don't enable behind Cloudflare Flexible — origin is
    # HTTP and HSTS would lock players out if your CF setup drifts.
    # add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    real_ip_header CF-Connecting-IP;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        client_max_body_size 256k;
    }

    # Private-anvil JSON-RPC proxy. Longer read timeout since anvil
    # may take a tick to mine a transaction; otherwise identical to /api/.
    location ~ ^/api/rpc/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        client_max_body_size 512k;
    }

    location /dist/ {
        alias /usr/share/nginx/html/dist/;
        autoindex off;
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
