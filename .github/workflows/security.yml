name: Security scan

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/security.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/security.yml"
  schedule:
    # Weekly Monday 04:00 UTC — catches CVEs in already-built layers.
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: |
          docker build -t ctf-${{ matrix.name }}:scan ${{ matrix.context }}

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ctf-${{ matrix.name }}:scan
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0   # SARIF upload below fails the run via Code Scanning

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Fail on CRITICAL/HIGH (PR builds only)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ctf-${{ matrix.name }}:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: table
